<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="{ lang: 'ar', scrolled: false, mobileOpen: false }"
  x-init="window.addEventListener('scroll', () => scrolled = window.scrollY > 50)">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Link® - Your Gateway to Premium Electronics</title>
  <link rel="icon" type="image/png" href="./imgs/logo.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#C41E3A',
            'primary-dark': '#9B1B30',
            dark: '#0a0a0a',
            'dark-light': '#1a1a1a',
            'dark-card': '#141414',
          },
          fontFamily: {
            sans: ['Inter', 'Cairo', 'sans-serif'],
            arabic: ['Cairo', 'sans-serif'],
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'spin-slow': 'spin 8s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-15px)' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(196, 30, 58, 0.5), 0 0 40px rgba(196, 30, 58, 0.3)' },
              '50%': { boxShadow: '0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.5), 0 0 90px rgba(196, 30, 58, 0.3)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    * {
      scroll-behavior: smooth;
    }

    body {
      background-color: #0a0a0a;
      color: #f5f5f5;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #C41E3A;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #e02a4a;
    }

    /* Glow Effects */
    .glow-red {
      box-shadow: 0 0 20px rgba(196, 30, 58, 0.5),
        0 0 40px rgba(196, 30, 58, 0.3),
        0 0 60px rgba(196, 30, 58, 0.2);
    }

    .glow-text {
      text-shadow: 0 0 10px rgba(196, 30, 58, 0.8),
        0 0 20px rgba(196, 30, 58, 0.5);
    }

    /* Gradient Background */
    .gradient-dark {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    }

    /* Grid Pattern */
    .grid-pattern {
      background-image:
        linear-gradient(rgba(196, 30, 58, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(196, 30, 58, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Card Hover */
    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(196, 30, 58, 0.2);
      border-color: #C41E3A;
    }

    /* Button Shine */
    .btn-shine {
      position: relative;
      overflow: hidden;
    }

    .btn-shine::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-shine:hover::before {
      left: 100%;
    }

    /* Nav Link Underline */
    .nav-link {
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #C41E3A;
      transition: width 0.3s ease;
    }

    [dir="rtl"] .nav-link::after {
      right: 0;
    }

    [dir="ltr"] .nav-link::after {
      left: 0;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Ticket Design */
    .ticket {
      position: relative;
      background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
      border: 2px dashed #C41E3A;
    }

    .ticket::before,
    .ticket::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      background: #0a0a0a;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }

    [dir="rtl"] .ticket::before {
      right: -15px;
    }

    [dir="rtl"] .ticket::after {
      left: -15px;
    }

    [dir="ltr"] .ticket::before {
      left: -15px;
    }

    [dir="ltr"] .ticket::after {
      right: -15px;
    }

    /* Floating Animation */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    /* Pulse Glow Animation */
    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(196, 30, 58, 0.5), 0 0 40px rgba(196, 30, 58, 0.3);
      }

      50% {
        box-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.5), 0 0 90px rgba(196, 30, 58, 0.3);
      }
    }

    .animate-pulse-glow {
      animation: pulseGlow 2s ease-in-out infinite;
    }

    /* Brand Icon Colors */
    .brand-arcelik {
      color: #C41E3A;
    }

    .brand-vestel {
      color: #E31837;
    }

    .brand-nextstar {
      color: #FF6B00;
    }

    .brand-navitig {
      color: #00A8E8;
    }

    .brand-onvo {
      color: #7B68EE;
    }

    .brand-vobim {
      color: #32CD32;
    }

    .brand-strong {
      color: #FFD700;
    }
  </style>
</head>
